<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Коваленко Олеся Викторовна. Лабораторная 6</title>
    <link rel="stylesheet" href="../main.css">
    <link rel="icon" href="../favicon.ico" type="image/x-icon">
    <link rel="icon" href="../favicon-16x16.png">
    <link rel="shortcut icon" href="../favicon-32x32.png">
    <script src="dop.js"></script>
    <script>
        function renderHeroButtons() {
            const container = document.getElementById('buttons-container');
            for (let i = 0; i < avengers.length; i++) {
                const hero = avengers[i];
                const btn = document.createElement('button');
                btn.textContent = hero.name;
                btn.className = 'hero-button';
                btn.addEventListener('click', (function(h) {
                    return function() {
                        let infoBlock = document.getElementById('info-output');
                        if (!infoBlock) {
                            infoBlock = document.createElement('div');
                            infoBlock.id = 'info-output';
                            infoBlock.className = 'info-area';
                            container.insertAdjacentElement('afterend', infoBlock);
                        }
                        infoBlock.innerHTML = `<strong>${h.name}</strong><br><br>${h.powers}<br><br>${h.first}`;
                    };
                })(hero));
                container.appendChild(btn);
            }
        }
        window.onload = renderHeroButtons;
    </script>
    <style>
        .buttons-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 25px 0;
        }
        .hero-button {
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 10px 22px;
            font-size: 16px;
            cursor: pointer;
        }
        .info-area {
            margin-top: 30px;
            padding: 20px;
            border: 2px solid #a7aeb4;
            border-radius: 20px;
            background-color: #fdf8ec;
            min-height: 180px;
            line-height: 1.5;
            font-size: 17px;
        }
    </style>
</head>
<body>
    <header>НГТУ, ФБ, Лабораторная работа 6</header>
    <main>
        <h2 style="color: #2c3e50; text-align: center;">Команда Мстителей</h2>
        <div id="buttons-container" class="buttons-panel"></div>
        <div id="info-output" class="info-area"></div>
    </main>
    <footer>&copy;Коваленко Олеся, ФБИ-44, 2 курс, 2026</footer>
</body>
</html>
