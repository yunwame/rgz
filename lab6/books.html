<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Коваленко Олеся Викторовна. Лабораторная 6</title>
    <link rel="stylesheet" href="../main.css">
    <link rel="icon" href="../favicon.ico" type="image/x-icon">
    <link rel="icon" href="../favicon-16x16.png">
    <link rel="shortcut icon" href="../favicon-32x32.png">
    <script src="books.js"></script>
    <script>
        function showBooks() {
            const bookList = document.getElementById('bookList');
            for(let i = 0; i < books.length; i++) {
                const b = books[i];
                let cardClass = 'book-card';
                if (b.bestseller) cardClass += ' bestseller';
                if (!b.inStock) cardClass += ' out-of-stock';

                let stockHtml = '';
                if (!b.inStock) {
                    stockHtml = `<span class="out-stock-badge">Нет в наличии</span>`;
                }

                const bookHtml = `
                    <div class="${cardClass}">
                    ${b.bestseller ? '<div class="bestseller-tag">БЕСТСЕЛЛЕР</div>' : ''}
                    <div class="book-author">${b.author}</div>
                    <div class="book-name">${b.name}</div>
                    <div class="book-meta">
                    <span class="book-year">${b.publicationYear} г.</span>
                    <span class="book-price">${b.price} P</span>
                    </div>${stockHtml}</div>
                `;
                bookList.innerHTML += bookHtml;
            }
        }   
    </script>
    <style>
        .book-card {
            background: rgb(230, 178, 178);
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 18px;
            border: 3px solid #723e3a;
            position: relative; 
            width: 400px;
        }
        .bestseller {
            border: 3px solid rgb(136, 54, 49);
            background-color: #e89271;
        }
        .bestseller-tag {
            background: #ffe419;
            color: #2c1e0a;
            font-weight: bold;
            font-size: 11px;  
            padding: 4px 12px;
            border-radius: 30px;
            position: absolute;
            top: 12px;
            right: 15px;
            display: inline-block;
        }
        .out-of-stock {
            opacity: 0.65;
            background: #bba9a0;
        }
        .book-author {
            font-weight: bold;
            font-size: 16px;   
            color: #652b22;
        }
        .book-name {
            font-size: 21px;  
            font-weight: bold;
            margin: 8px 0 5px;
            color: #121e28;
        }
        .book-meta {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
        }
        .book-year {
            background: #eef2f7;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 13px;
        }
        .book-price {
            font-size: 24px;  
            font-weight: bold;
            color: #3a8127;
        }
        .out-stock-badge {
            background: #e2e6ec;
            color: #7c7f85;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;  
        }
    </style>
    </head>
<body onload="showBooks()">
    <header>
        НГТУ, ФБ, Лабораторная работа 6
    </header>
    <main>
        <h1>Список книг</h1>
        <div id="bookList">
        </div>
    </main>

    <footer>
        &copy; Коваленко Олеся, ФБИ-44, 2 курс, 2026
    </footer>

</body>
</html>
