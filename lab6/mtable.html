<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Коваленко Олеся Викторовна. Таблица умножения</title>
    <link rel="stylesheet" href="../main.css">
    <link rel="icon" href="../favicon.ico" type="image/x-icon">
    <link rel="icon" href="../favicon-16x16.png">
    <link rel="shortcut icon" href="../favicon-32x32.png">
    <script>
        function showMutipleTable() {
            let tbl = document.getElementById('mtable');
            tbl.innerHTML = '<h1>Таблица умножения</h1>';
            for (i = 1; i <= 10; i++) {
                let s = `<div>${i} * 7 = ${i * 7}</div>`;
                tbl.innerHTML += s;
            }
        }
    </script>

    <style>
        #mtable {
            border: 5px solid;
            border-radius: 15%;
            text-align: center;
            padding: 5px 10px 45px 10px;
            background-color: rgb(191, 164, 172);
            color: rgb(39, 27, 27);
            position: relative;
            left: 600px;
            width: 200px;
        }
    </style>
</head>

<body onload="showMutipleTable()">
    <header>
        НГТУ, ФБ, Лабораторная работа 4
    </header>

    <main>
        <div id="mtable"></div>
    </main>

    <footer>
        &copy; Коваленко Олеся, ФБИ-44, 2 курс, 2026
    </footer>
</body>

</html>
