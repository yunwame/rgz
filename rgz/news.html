<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Юнипро. Новости</title>
    <link rel="stylesheet" href="main.css">
    <style>
        .content {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            color: #244887;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 22px;
            margin-bottom: 25px;
            width: 100%;
        }

        .card:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .date {
            color: #244887;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .title {
            font-size: 25px;
            font-weight: bold;
            color: #3d67af;
            margin-bottom: 12px;
        }

        .short-text {
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .full-text {
            display: none;
            background: #e8eef8;
            padding: 14px;
            border-radius: 12px;
            margin: 12px 0;
            line-height: 1.5;
        }

        .full-text.show {
            display: block;
        }

        .btn-show {
            background: #788db3;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }

        .btn-show:hover {
            background: #244887;
        }
    </style>
    <script>
        function toggleNews(btn, index) {
            var fullDiv = document.getElementById('full-' + index);
            if (fullDiv.className.indexOf('show') >= 0) {
                fullDiv.className = fullDiv.className.replace(' show', '');
                btn.value = 'Показать полностью';
            } else {
                fullDiv.className = fullDiv.className + ' show';
                btn.value = 'Скрыть';
            }
        }

        function renderNews() {
            var container = document.getElementById('newsContainer');
            var out = '';
            for (var i = 0; i < newsData.length; i++) {
                out += '<div class="card">';
                out += '<div class="date">' + newsData[i].date + '</div>';
                out += '<div class="title">' + newsData[i].title + '</div>';
                out += '<div class="short-text">' + newsData[i].short + '</div>';
                out += '<div id="full-' + i + '" class="full-text">' + newsData[i].full + '</div>';
                out += '<input type="button" class="btn-show" value="Показать полностью" onclick="toggleNews(this, ' + i + ')">';
                out += '</div>';
            }
            container.innerHTML = out;
        }

        function goUp() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.addEventListener('DOMContentLoaded', function () {
            renderNews();
        });
    </script>
    <script src="news.js"></script>
</head>

<body>

    <header></header>

    <main>
        <div class="menu">
            <a href="aboutcompany.html">О компании</a>
            <a href="news.html" class="active">Новости</a>
            <a href="valuta.html">Курс валют</a>
            <a href="contact.html">Контакты</a>
            <a href="video.html">Видео</a>
        </div>

        <div class="content">
            <h1>Новости компании Юнипро</h1>
            <div id="newsContainer" class="news-list"></div>
            <button class="up-btn" onclick="goUp()">↑ Наверх</button>
        </div>
    </main>

    <footer>
        <p>&copy; 2013 - 2026 Официальный сайт ПАО «Юнипро»</p>
    </footer>

</body>

</html>
