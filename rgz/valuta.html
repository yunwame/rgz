<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Юнипро. Курс валют</title>
    <link rel="stylesheet" href="main.css">
    <style>
        .converter {
            background: white;
            padding: 17px;
            border-radius: 20px;
            margin-bottom: 30px;
        }

        .converter input {
            margin: 10px;
            font-size: 16px;
            padding: 8px;
        }

        .diagram {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            padding: 20px;
            background: #d9e1ec;
            border-radius: 20px;
            min-height: 320px;
            overflow-x: auto;
        }

        .bar {
            width: 35px;
            background: #244887;
            cursor: pointer;
            text-align: center;
            font-size: 10px;
            color: white;
            padding-top: 5px;
            border-radius: 4px 4px 0 0;
        }

        .bar.selected {
            background: #809aae;
            color: white;
            box-shadow: 0 0 0 2px #070e54;
        }

        .bar-label {
            font-size: 10px;
            text-align: center;
            margin-top: 5px;
        }

        .info {
            background: #d9e1ec;
            padding: 10px;
            border-radius: 15px;
            margin-top: 15px;
            text-align: center;
        }
    </style>
    <script>
        let cadRate = 0;
        let cadRates = [51.52, 51.48, 51.55, 51.61, 51.58, 51.49, 51.43,
            51.38, 51.35, 51.42, 51.51, 51.59, 51.63, 51.67,
            51.72, 51.68, 51.60, 51.54, 51.47, 51.39, 51.34,
            51.31, 51.36, 51.44, 51.52, 51.58, 51.64, 51.70,
            51.75, 51.73];
        const historyData = [];

        function loadRate() {
            fetch('https://www.cbr-xml-daily.ru/daily_json.js')
                .then(function (res) { return res.json(); })
                .then(function (data) {
                    cadRate = data.Valute.CAD.Value;
                    document.getElementById('rate').innerHTML = '1 CAD = ' + cadRate.toFixed(4) + ' ₽';
                    makeHistory();
                    drawDiagram();
                });
        }

        function makeHistory() {
            const today = new Date();
            for (let i = 0; i < cadRates.length; i++) {
                const d = new Date(today);
                d.setDate(today.getDate() - (cadRates.length - 1 - i));
                const dateStr = d.getDate() + '.' + (d.getMonth() + 1);
                historyData[i] = { date: dateStr, rate: cadRates[i].toFixed(2) };
            }
        }

        function drawDiagram() {
            const container = document.getElementById('diagram');
            let maxRate = cadRates[0];
            let minRate = cadRates[0];
            for (let i = 0; i < cadRates.length; i++) {
                if (cadRates[i] > maxRate) maxRate = cadRates[i];
                if (cadRates[i] < minRate) minRate = cadRates[i];
            }
            let range = maxRate - minRate;
            if (range < 1) range = 1;

            let out = '';
            for (let i = 0; i < historyData.length; i++) {
                const h = 40 + ((historyData[i].rate - minRate) / range) * 150;
                out = out + '<div style="display: flex; flex-direction: column; align-items: center;">';
                out = out + '<div class="bar" style="height: ' + h + 'px" onclick="selectBar(' + i + ')">' + historyData[i].rate + '</div>';
                out = out + '<div class="bar-label">' + historyData[i].date + '</div>';
                out = out + '</div>';
            }
            container.innerHTML = out;
        }

        function selectBar(index) {
            const bars = document.querySelectorAll('.bar');
            for (let i = 0; i < bars.length; i++) {
                bars[i].className = 'bar';
            }
            bars[index].className = 'bar selected';
            document.getElementById('info').innerHTML = historyData[index].date + ' | Курс CAD: ' + historyData[index].rate + ' ₽';
        }

        function rubToCad() {
            const rub = document.getElementById('rub').value;
            if (rub === '' || isNaN(rub)) {
                document.getElementById('cadOut').value = '';
                return;
            }
            const res = parseFloat(rub) / cadRate;
            document.getElementById('cadOut').value = res.toFixed(4);
        }

        function cadToRub() {
            const cad = document.getElementById('cad').value;
            if (cad === '' || isNaN(cad)) {
                document.getElementById('rubOut').value = '';
                return;
            }
            const res = parseFloat(cad) * cadRate;
            document.getElementById('rubOut').value = res.toFixed(2);
        }

        document.addEventListener('DOMContentLoaded', function () {
            loadRate();
        });
    </script>
</head>

<body>

    <header></header>

    <main>
        <div class="menu">
            <a href="aboutcompany.html">О компании</a>
            <a href="news.html">Новости</a>
            <a href="valuta.html" class="active">Курс валют</a>
            <a href="contact.html">Контакты</a>
            <a href="video.html">Видео</a>
        </div>

        <div class="content">
            <h1>Курс валют</h1>

            <div class="converter">
                <h3>Канадский доллар (CAD)</h3>
                <div id="rate">Загрузка...</div>
                <input type="number" id="rub" placeholder="Рубли" oninput="rubToCad()">
                <input type="text" id="cadOut" placeholder="CAD" readonly>
                <br>
                <input type="number" id="cad" placeholder="CAD" oninput="cadToRub()">
                <input type="text" id="rubOut" placeholder="Рубли" readonly>
            </div>

            <h3>Динамика курса за месяц</h3>
            <div id="diagram" class="diagram"></div>
            <div id="info" class="info">Кликните по столбцу</div>>
        </div>
    </main>

    <footer>
        <p>&copy; 2013 - 2026 Официальный сайт ПАО «Юнипро»</p>
    </footer>

</body>

</html>
