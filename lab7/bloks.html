<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Коваленко Олеся Викторовна. Лабораторная 7</title>
    <link rel="stylesheet" href="../main.css">
    <link rel="icon" href="../favicon.ico" type="image/x-icon">
    <link rel="icon" href="../favicon-16x16.png">
    <link rel="shortcut icon" href="../favicon-32x32.png">
    <script>
        function addNewBlock() {
            let newBlock = document.createElement('div');
            newBlock.style.backgroundColor = 'pink';
            newBlock.style.height = '40px';
            newBlock.style.border = '2px solid DeepPink';      
            newBlock.style.width = '80%';                  
            newBlock.style.margin = '10px auto';           
            newBlock.style.borderRadius = '20px';         

            document.querySelector('main').appendChild(newBlock);
        }
    </script>
</head>

<body>
    <header>
        НГТУ, ФБ, Лабораторная работа 7
    </header>

    <main>
        <button onclick="addNewBlock()">Добавить блок</button>
    </main>

    <footer>
        &copy; Коваленко Олеся, ФБИ-44, 2 курс, 2026
    </footer>

</body>

</html>
