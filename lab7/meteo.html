<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Коваленко Олеся Викторовна. Лабораторная 7</title>
    <link rel="stylesheet" href="../main.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="../favicon-16x16.png">
    <link rel="icon" href="../favicon-32x32.png">
    <style>
        .weather-card {
            border: 2px solid #d48690;
            border-radius: 25px;
            width: 360px;
            padding: 10px;
            margin: 10px;
            background: #ebc4ca;
            color: rgb(108, 68, 87);
        }
    </style>
    <script>
        function getWeather() {
            const url = 'https://api.open-meteo.com/v1/forecast?latitude=55.0415&longitude=82.9346&hourly=temperature_2m&timezone=Asia%2FBangkok';
            fetch(url)
                .then(function (response) {
                    return response.json();
                })
                .then(function (data) {
                    let times = data.hourly.time;
                    let temps = data.hourly.temperature_2m;
                    let today = new Date().toISOString().slice(0, 10);

                    let temp8 = null;
                    let temp12 = null;
                    let temp20 = null;

                    for (let i = 0; i < times.length; i++) {
                        if (times[i].startsWith(today + 'T08:00')) {
                            temp8 = temps[i];
                        }
                        if (times[i].startsWith(today + 'T12:00')) {
                            temp12 = temps[i];
                        }
                        if (times[i].startsWith(today + 'T20:00')) {
                            temp20 = temps[i];
                        }
                    }

                    document.getElementById('weather-info').innerHTML = `
                        <div class="weather-card">
                            <b>Прогноз погоды в Новосибирске на сегодня</b><br>
                            8:00: ${temp8} °C<br>
                            12:00: ${temp12} °C<br>
                            20:00: ${temp20} °C
                        </div>
                    `;
                });
        }
    </script>
</head>

<body>
    <header>НГТУ, ФБ, Лабораторная работа 7</header>
    <main>
        <button onclick="getWeather()">Погода в Новосибирске</button>
        <div id="weather-info"></div>
    </main>
    <footer>&copy;Коваленко Олеся, ФБИ-44, 2 курс, 2026</footer>
</body>

</html>
