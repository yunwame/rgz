<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Коваленко Олеся Викторовна. Лабораторная 7</title>
    <link rel="stylesheet" href="../main.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="../favicon-16x16.png">
    <link rel="icon" href="../favicon-32x32.png">
    <script>
        const dates = [
            "26.05.2026", "25.05.2026", "22.05.2026", "21.05.2026", "20.05.2026",
            "19.05.2026", "18.05.2026", "15.05.2026", "14.05.2026", "13.05.2026",
            "12.05.2026", "11.05.2026", "08.05.2026", "07.05.2026", "06.05.2026"
        ];

        const prices = [302.16, 303.22, 309.78, 312.22, 312.46, 314.76, 311.82, 309.22, 313.94, 318.52, 316.92, 311.14, 308.05, 308.22, 309.22];

        function showTable() {
            let table = document.getElementById('stock-table');
            table.innerHTML = '<tr><th>Дата</th><th>Цена</th><th>Разница</th></tr>';

            for (let i = 0; i < prices.length; i++) {
                let tr = document.createElement('tr');

                let tdDate = document.createElement('td');
                tdDate.innerHTML = dates[i];
                tr.appendChild(tdDate);

                let tdPrice = document.createElement('td');
                tdPrice.innerHTML = prices[i].toFixed(2);
                tr.appendChild(tdPrice);

                let tdDiff = document.createElement('td');
                if (i === 0) {
                    tdDiff.innerHTML = '—';
                } else {
                    let diff = prices[i] - prices[i - 1];
                    tdDiff.innerHTML = diff.toFixed(2);
                    if (diff > 0) tdDiff.style.color = 'green';
                    if (diff < 0) tdDiff.style.color = 'red';
                }
                tr.appendChild(tdDiff);
                table.appendChild(tr);
            }

            let sum = 0, max = prices[0], min = prices[0];
            for (let i = 0; i < prices.length; i++) {
                sum += prices[i];
                if (prices[i] > max) max = prices[i];
                if (prices[i] < min) min = prices[i];
            }
            let avg = sum / prices.length;
            document.getElementById('detail').innerHTML = `Среднее значение: ${avg.toFixed(2)}<br>Максимальное значение: ${max.toFixed(2)}<br>Минимальное значение: ${min.toFixed(2)}`;
        }
    </script>
</head>

<body>
    <header>НГТУ, ФБ, Лабораторная работа 7</header>
    <main>
        <button onclick="showTable()">Курс акций Т-Технологии</button>
        <table border="1" id="stock-table"></table>
        <div id="detail"></div>
    </main>
    <footer>&copy;Коваленко Олеся, ФБИ-44, 2 курс, 2026</footer>
</body>

</html>
