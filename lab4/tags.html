<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Коваленко Олеся Викторовна. Лабораторная 4</title>
    <link rel="stylesheet" href="../main.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="../favicon-16x16.png">
    <link rel="icon" href="../favicon-32x32.png">
    <style>
        .tag {
            position: absolute;
            padding: 5px 10px;
            font-weight: bold;
            transition: .3s;
            animation: float linear infinite;
        }

        .tag:hover {
            animation: none;
            transform: scale(1.4) rotate(var(--r));
            z-index: 100;
            text-shadow: 3px 3px 3px rgb(63, 14, 14);
        }

        .t1 {
            top: 10%;
            left: 20%;
            font-size: 50px;
            color: rgb(183, 31, 31);
            --r: 15deg;
            animation-duration: 12s;
        }

        .t2 {
            top: 25%;
            left: 50%;
            font-size: 67px;
            color: rgb(28, 28, 179);
            --r: -20deg;
            animation-duration: 10s;
        }

        .t3 {
            top: 60%;
            left: 15%;
            font-size: 42px;
            color: rgb(13, 140, 13);
            --r: 30deg;
            animation-duration: 14s;
        }

        .t4 {
            top: 70%;
            left: 40%;
            font-size: 38px;
            color: rgb(255, 156, 9);
            --r: -10deg;
            animation-duration: 11s;
        }

        .t5 {
            top: 20%;
            left: 75%;
            font-size: 63px;
            color: rgb(150, 8, 150);
            --r: 25deg;
            animation-duration: 13s;
        }

        .t6 {
            top: 50%;
            left: 80%;
            font-size: 51px;
            color: rgb(102, 57, 57);
            --r: -30deg;
            animation-duration: 9s;
        }

        .t7 {
            top: 80%;
            left: 10%;
            font-size: 36px;
            color: rgb(17, 157, 157);
            --r: 5deg;
            animation-duration: 15s;
        }

        .t8 {
            top: 40%;
            left: 30%;
            font-size: 70px;
            color: deeppink;
            --r: -5deg;
            animation-duration: 10s;
        }

        .t9 {
            top: 65%;
            left: 60%;
            font-size: 24px;
            color: gold;
            --r: 12deg;
            animation-duration: 12s;
        }

        .t10 {
            top: 15%;
            left: 35%;
            font-size: 55px;
            color: rgb(5, 159, 159);
            --r: -15deg;
            animation-duration: 14s;
        }

        .t11 {
            top: 35%;
            left: 70%;
            font-size: 32px;
            color: magenta;
            --r: 18deg;
            animation-duration: 11s;
        }

        .t12 {
            top: 55%;
            left: 25%;
            font-size: 26px;
            color: rgb(5, 5, 140);
            --r: -12deg;
            animation-duration: 13s;
        }

        .t13 {
            top: 75%;
            left: 50%;
            font-size: 29px;
            color: coral;
            --r: 8deg;
            animation-duration: 9s;
        }

        .t14 {
            top: 30%;
            left: 10%;
            font-size: 39px;
            color: darkgreen;
            --r: -25deg;
            animation-duration: 15s;
        }

        .t15 {
            top: 85%;
            left: 70%;
            font-size: 68px;
            color: indigo;
            --r: 10deg;
            animation-duration: 10s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) rotate(var(--r));
            }

            50% {
                transform: translate(40px, -40px) rotate(var(--r));
            }

            100% {
                transform: translate(0, 0) rotate(var(--r));
            }
        }
    </style>
</head>

<body>
    <header>
        НГТУ, ФБ, Лабораторная работа 4
    </header>

    <main>
        <div class="tag t1">position</div>
        <div class="tag t2">absolute</div>
        <div class="tag t3">relative</div>
        <div class="tag t4">fixed</div>
        <div class="tag t5">sticky</div>

        <div class="tag t6">z-index</div>
        <div class="tag t7">display</div>
        <div class="tag t8">flex</div>
        <div class="tag t9">grid</div>
        <div class="tag t10">overflow</div>

        <div class="tag t11">margin</div>
        <div class="tag t12">padding</div>
        <div class="tag t13">transform</div>
        <div class="tag t14">animation</div>
        <div class="tag t15">hover</div>
    </main>

    <footer>
        &copy; Коваленко Олеся, ФБИ-44, 2 курс, 2026
    </footer>

</body>

</html>
