<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Коваленко Олеся Викторовна. Арифметика</title>
    <link rel="stylesheet" href="../main.css">
    <link rel="icon" href="../favicon.ico" type="image/x-icon">
    <link rel="icon" href="../favicon-16x16.png">
    <link rel="shortcut icon" href="../favicon-32x32.png">
    <script>
        function showSum() {
            let a = 5154;
            let b = 7891;
            let result = a + b;
            alert("Сумма " + 5154 + " и " + 7891 + " равна " + result);
        }

        function showAuthor() {
            let author = "Автор страницы:\nКоваленко Олеся Викторовна";
            alert(author);
        }

        function showHello() {
            alert("Приветствую вас на моей странице!\n«Код — это поэзия, которую понимает машина»")
        }
    </script>
    <style>
        .message {
            border: 2px solid;
            display: inline-block;
            border-radius: 4px;
            padding: 4px;
            background-color: rgb(189, 146, 160);
            color: rgb(110, 58, 66);
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <header onclick="showAuthor()" style="cursor: pointer;">
        НГТУ, ФБ, Лабораторная работа 4
    </header>

    <main>
        <div class="message" onclick="showSum()">Сколько будет 5154+7891?</div>
        <div class="message" onclick="showAuthor()">Узнать, кто автор страницы</div>
    </main>

    <footer ondblclick="showHello()" style="cursor: pointer;">
        &copy; Коваленко Олеся, ФБИ-44, 2 курс, 2026
    </footer>
</body>

</html>
