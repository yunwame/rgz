<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Коваленко Олеся Викторовна. Арифметика</title>
    <link rel="stylesheet" href="../main.css">
    <link rel="icon" href="../favicon.ico" type="image/x-icon">
    <link rel="icon" href="../favicon-16x16.png">
    <link rel="shortcut icon" href="../favicon-32x32.png">
    <script>
        function showStepen() {
            let inputA = document.getElementById("numberA");
            let inputB = document.getElementById("numberB");

            let a = parseInt(inputA.value);
            let b = parseInt(inputB.value);

            if (b == 0 && a == 0) {
                alert("Ноль нельзя возвсети в степень равную нулю!");
                inputB.focus();
                inputB.select();
                inputB.style.color = "red";
                inputB.style.borderColor = "red";
                inputA.focus();
                inputA.select();
                inputA.style.color = "red";
                inputA.style.borderColor = "red";
                return;
            }

            if (isNaN(a)) {
                alert("Введите числовые даные!")
                inputA.focus();
                inputA.select();
                inputA.style.color = "red";
                inputA.style.borderColor = "red";
                return;
            }

            if (isNaN(b)) {
                alert("Введите числовые даные!")
                inputB.focus();
                inputB.select();
                inputB.style.color = "red";
                inputB.style.borderColor = "red";
                return;
            }

            inputB.style.color = '';
            inputB.style.borderColor = '';

            let result = a ** b;
            alert(a + " в степени " + b + " = " + result);
        }

        function showDiv() {
            let inputA = document.getElementById("numberA");
            let inputB = document.getElementById("numberB");

            let a = parseInt(inputA.value);
            let b = parseInt(inputB.value);
            if (b == 0) {
                alert("На ноль делить нельзя!");
                inputB.focus();
                inputB.select();
                inputB.style.color = "red";
                inputB.style.borderColor = "red";
                return;
            }

            if (isNaN(a)) {
                alert('Введите числовое значение в первое поле');
                inputA.focus();
                inputA.select();
                inputA.style.color = "red";
                inputA.style.borderColor = "red";
                return;
            }

            if (isNaN(b)) {
                alert('Введите числовое значение во второе поле');
                inputB.focus();
                inputB.select();
                inputB.style.color = "red";
                inputB.style.borderColor = "red";
                return;
            }

            inputB.style.color = '';
            inputB.style.borderColor = '';

            let result = a / b;
            alert(a + " / " + b + " = " + result);
        }

        function showProizved() {
            let inputA = document.getElementById("numberA");
            let inputB = document.getElementById("numberB");

            let a = parseInt(inputA.value);
            let b = parseInt(inputB.value);
            let result = a * b;
            alert("Произведение " + a + " и " + b + " равно " + result)
        }

        function showRaznost() {
            let inputA = document.getElementById("numberA");
            let inputB = document.getElementById("numberB");

            let a = parseInt(inputA.value);
            let b = parseInt(inputB.value);
            let result = a - b;
            alert("Разность " + a + " и " + b + " равна " + result)
        }

        function showSum() {
            let inputA = document.getElementById("numberA");
            let inputB = document.getElementById("numberB");

            let a = parseInt(inputA.value);
            let b = parseInt(inputB.value);
            let result = a + b;
            alert("Сумма " + a + " и " + b + " равна " + result);
        }

        function showAuthor() {
            let author = "Автор страницы:\nКоваленко Олеся Викторовна";
            alert(author);
        }

        function showHello() {
            alert("Приветствую вас на моей странице!\n«Код — это поэзия, которую понимает машина»")
        }

        function changeOutput(buttonNum, backColor, textColor, borderStyle, borderRadius, width, borderWidth) {
            let output = document.getElementById("output");
            output.innerHTML = "Нажата кнопка " + buttonNum;
            output.style.backgroundColor = backColor;
            output.style.color = textColor;
            output.style.borderStyle = borderStyle;
            output.style.borderRadius = borderRadius;
            output.style.width = width;
            output.style.borderWidth = borderWidth;
        }

    </script>
    <style>
        .message {
            border: 2px solid;
            display: inline-block;
            border-radius: 4px;
            padding: 4px;
            background-color: rgb(189, 146, 160);
            color: rgb(110, 58, 66);
            font-weight: bold;
            cursor: pointer;
        }

        #output {
            border: 1px solid;
            width: 300px;
            height: 40px;
        }
    </style>
</head>

<body>
    <header onclick="showAuthor()" style="cursor: pointer;">
        НГТУ, ФБ, Лабораторная работа 4
    </header>

    <main>
        <label>Первое число: <input type="number" value="5154" id="numberA"></label><br>
        <label>Второе число: <input type="number" value="7891" id="numberB"></label><br>
        <div class="message" onclick="showProizved()">Найти произведение чисел</div>
        <div class="message" onclick="showRaznost()">Найти разность чисел</div>
        <div class="message" onclick="showSum()">Найти сумму чисел</div>
        <div class="message" onclick="showAuthor()">Узнать, кто автор страницы</div>
        <div class="message" onclick="showDiv()">Найти отношение чисел</div>
        <div class="message" onclick="showStepen()">Возвести в степень</div>

        <div>
            <input type="button" value="Кнопка 1"
                onclick="changeOutput(1, 'red', 'yellow', 'solid', '10px', '200px', '2px')">
            <input type="button" value="Кнопка 2"
                onclick="changeOutput(2, 'black', 'lime', 'dotted', '15px', '250px', '3px')">
            <input type="button" value="Кнопка 3"
                onclick="changeOutput(3, 'pink', 'purple', 'dashed', '20px', '300px', '4px')">
            <input type="button" value="Кнопка 4"
                onclick="changeOutput(4, 'brown', 'white', 'double', '25px', '350px', '5px')">
        </div>

        <div id="output"></div>
    </main>

    <footer ondblclick="showHello()" style="cursor: pointer;">
        &copy; Коваленко Олеся, ФБИ-44, 2 курс, 2026
    </footer>
</body>

</html>
